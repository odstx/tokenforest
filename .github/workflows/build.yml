name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  JWT_SECRET: test-secret-key-for-ci-32characters
  ENCRYPTION_KEY: test-encryption-key-for-ci

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Run backend tests
        run: cd backend && cargo test --lib

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install frontend dependencies
        run: cd frontend && bun install
      
      - name: Run type check
        run: cd frontend && bun run check

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install frontend dependencies
        run: cd frontend && bun install
      
      - name: Build frontend
        run: cd frontend && bun run build
      
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/build/

  build-backend:
    name: Build Backend (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [test-backend, build-frontend]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: tokenforest_backend
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: tokenforest_backend
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: tokenforest_backend
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: tokenforest_backend
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: tokenforest_backend.exe
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/build/
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
      
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      
      - name: Install SQLite (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
      
      - name: Install SQLite (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install sqlite
      
      - name: Install SQLite (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install sqlite3:x64-windows
          echo "SQLITE3_LIB_DIR=C:\vcpkg\installed\x64-windows\lib" >> $env:GITHUB_ENV
      
      - name: Build backend
        run: cd backend && cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: backend/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: [build-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p release
          
          # Package each backend binary (now includes embedded frontend)
          for dir in artifacts/backend-*; do
            target=$(basename $dir | sed 's/backend-//')
            cd $dir
            if [ -f "tokenforest_backend.exe" ]; then
              zip ../../release/tokenforest-${target}.zip tokenforest_backend.exe
            else
              zip ../../release/tokenforest-${target}.zip tokenforest_backend
            fi
            cd ../..
          done
      
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
